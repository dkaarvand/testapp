name: CI

on:
  push:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/dkaarvand/testapp:latest
            ghcr.io/dkaarvand/testapp:${{ github.sha }}

      - name: Update config repo with new image tag
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/dkaarvand/testapp-config.git
          cd testapp-config

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            sed -i "s|ghcr.io/dkaarvand/testapp:.*|ghcr.io/dkaarvand/testapp:${{ github.sha }}|" production/deployment.yaml
            git add production/deployment.yaml
          else
            sed -i "s|ghcr.io/dkaarvand/testapp:.*|ghcr.io/dkaarvand/testapp:${{ github.sha }}|" dev/deployment.yaml
            git add dev/deployment.yaml
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -m "CI: update image tag to ${{ github.sha }}"
          git push