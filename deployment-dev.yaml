apiVersion: apps/v1
kind: Deployment
metadata:
  name: testapp-dev
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testapp-dev
  template:
    metadata:
      labels:
        app: testapp-dev
    spec:
      containers:
        - name: testapp-dev
          image: ghcr.io/dkaarvand/testapp:939275069ae2e035c2dacc57b008e6e65a417a9d
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: testapp-dev
  namespace: dev
spec:
  selector:
    app: testapp-dev
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: testapp-dev
  namespace: dev
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: testapp-dev
                port:
                  number: 80